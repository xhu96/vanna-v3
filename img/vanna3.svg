<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" style="background-color: #0b0f19;">
  <defs>
    <!-- Patterns -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
    <pattern id="dotPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" fill-opacity="0.08" />
    </pattern>

    <!-- Gradients -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>

    <linearGradient id="v3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9" />
    </linearGradient>
    
    <linearGradient id="solidCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.1)" />
      <stop offset="50%" stop-color="rgba(255, 255, 255, 0.05)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.1)" />
    </linearGradient>

    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="cardInner" filterUnits="userSpaceOnUse">
      <feOffset dx="0" dy="1" />
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="out" />
      <feFlood flood-color="#ffffff" flood-opacity="0.1" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" />
      <feComposite in2="SourceGraphic" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748B"/></marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#818CF8"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#34D399"/></marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#F59E0B"/></marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#60A5FA"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="850" rx="16" fill="#0b0f19"/>
  <rect width="1100" height="850" rx="16" fill="url(#gridPattern)" />
  <rect width="1100" height="850" rx="16" fill="url(#dotPattern)" />

  <!-- Title bar -->
  <rect x="0" y="0" width="1100" height="64" rx="16" fill="url(#headerGrad)"/>
  <rect x="0" y="40" width="1100" height="24" fill="url(#headerGrad)"/>
  <text x="550" y="42" text-anchor="middle" fill="white" font-size="28" font-weight="900" letter-spacing="0.8">Vanna 3.2: The Data Evidence Engine</text>
  
  <rect x="975" y="16" width="105" height="32" rx="16" fill="#0b0f19" opacity="0.4"/>
  <text x="1027" y="38" text-anchor="middle" font-size="16" font-weight="800" fill="#38ef7d">v3.2.0</text>

  <!-- ===== ROW 1: USER EXPERIENCE (TIER 1) ===== -->
  <text x="40" y="105" font-size="12" font-weight="800" fill="#64748B" letter-spacing="2">USER EXPERIENCE LAYER</text>
  
  <!-- User -->
  <g transform="translate(40, 120)" filter="url(#shadow)">
    <rect width="180" height="80" rx="16" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5"/>
    <text x="90" y="38" text-anchor="middle" font-size="24" fill="#94A3B8">👤</text>
    <text x="90" y="62" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">User</text>
  </g>

  <!-- Arrow User → Web Component -->
  <line x1="220" y1="160" x2="280" y2="160" stroke="#64748B" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowGray)"/>

  <!-- Web Component -->
  <g transform="translate(280, 120)" filter="url(#shadow)">
    <rect width="250" height="80" rx="16" fill="url(#cardGrad)" stroke="#06B6D4" stroke-width="2"/>
    <text x="125" y="34" text-anchor="middle" font-size="18" fill="#00C6FF" font-weight="800">&lt;vanna-chat&gt;</text>
    <text x="125" y="58" text-anchor="middle" font-size="12" fill="#94A3B8">Typed SSE • ChartSpec Renderer</text>
    <text x="125" y="74" text-anchor="middle" font-size="11" fill="#cbd5e1">React • Vue • Plain HTML</text>
  </g>

  <!-- Arrow Web Component → Server -->
  <line x1="530" y1="160" x2="580" y2="160" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Server -->
  <g transform="translate(580, 110)" filter="url(#shadow)">
    <rect width="480" height="100" rx="16" fill="url(#cardGrad)" stroke="#3B82F6" stroke-width="2"/>
    <text x="240" y="34" text-anchor="middle" font-size="18" font-weight="900" fill="#60A5FA">🐍 Integrated Server (FastAPI/Flask)</text>
    <text x="240" y="60" text-anchor="middle" font-size="12" fill="#94A3B8">Auth Middleware • Row-Level Security • /api/vanna/v3/*</text>
    <text x="240" y="82" text-anchor="middle" font-size="12" fill="#cbd5e1" font-weight="700">User Resolver → Immutable Identity Thread</text>
  </g>

  <!-- ===== ROW 2: COGNITIVE ORCHESTRATION (TIER 2) ===== -->
  <text x="40" y="245" font-size="12" font-weight="800" fill="#818CF8" letter-spacing="2">COGNITIVE ORCHESTRATION LAYER</text>
  
  <g transform="translate(40, 260)" filter="url(#shadow)">
    <rect width="1020" height="240" rx="24" fill="#0f172a" stroke="url(#agentGrad)" stroke-width="2.5"/>
    <rect width="1020" height="240" rx="24" fill="url(#agentGrad)" opacity="0.03"/>
    
    <text x="510" y="36" text-anchor="middle" font-size="20" font-weight="950" fill="#A78BFA">🤖 Agent Core: The Semantic Planner</text>

    <!-- Sub-boxes grid -->
    <!-- Column 1 -->
    <g transform="translate(40, 60)">
      <rect width="300" height="70" rx="14" fill="url(#solidCard)" stroke="#4C1D95" stroke-width="1.5" opacity="0.9"/>
      <text x="150" y="32" text-anchor="middle" font-size="15" font-weight="800" fill="#C4B5FD">🧠 Semantic Router</text>
      <text x="150" y="55" text-anchor="middle" font-size="11" fill="#94A3B8">Metric-First • Zero-Shot Fallback</text>
    </g>
    
    <g transform="translate(40, 145)">
      <rect width="300" height="70" rx="14" fill="url(#solidCard)" stroke="#4C1D95" stroke-width="1.5" opacity="0.9"/>
      <text x="150" y="32" text-anchor="middle" font-size="15" font-weight="800" fill="#C4B5FD">🧰 Skill Fabric Registry</text>
      <text x="150" y="55" text-anchor="middle" font-size="11" fill="#94A3B8">Declarative Spec • Ad-Hoc Teams</text>
    </g>

    <!-- Column 2 (Center) -->
    <g transform="translate(360, 60)">
      <rect width="300" height="70" rx="14" fill="url(#solidCard)" stroke="#10B981" stroke-width="2" opacity="0.9"/>
      <text x="150" y="32" text-anchor="middle" font-size="15" font-weight="800" fill="#34D399">📋 Lineage Evidence Trail</text>
      <text x="150" y="55" text-anchor="middle" font-size="11" fill="#94A3B8">Provenance • Scores • Tool Logs</text>
    </g>

    <g transform="translate(360, 145)">
      <rect width="300" height="70" rx="14" fill="url(#solidCard)" stroke="#10B981" stroke-width="2" opacity="0.9"/>
      <text x="150" y="32" text-anchor="middle" font-size="15" font-weight="800" fill="#34D399">👍 Feedback Memory Store</text>
      <text x="150" y="55" text-anchor="middle" font-size="11" fill="#94A3B8">Weighted Patches • Golden Queue</text>
    </g>

    <!-- Column 3 -->
    <g transform="translate(680, 60)">
      <rect width="300" height="70" rx="14" fill="url(#solidCard)" stroke="#4C1D95" stroke-width="1.5" opacity="0.9"/>
      <text x="150" y="32" text-anchor="middle" font-size="15" font-weight="800" fill="#C4B5FD">⚡ Streaming Event Engine</text>
      <text x="150" y="55" text-anchor="middle" font-size="11" fill="#94A3B8">Status-Typed v3 Events</text>
    </g>

    <g transform="translate(680, 145)">
      <rect width="300" height="70" rx="14" fill="url(#solidCard)" stroke="#4C1D95" stroke-width="1.5" opacity="0.9"/>
      <text x="150" y="32" text-anchor="middle" font-size="15" font-weight="800" fill="#C4B5FD">🔒 Security Middleware</text>
      <text x="150" y="55" text-anchor="middle" font-size="11" fill="#94A3B8">Read-Only SQL • PII Masking</text>
    </g>
  </g>

  <!-- ===== ROW 3: DATA FOUNDATION (TIER 3) ===== -->
  <text x="40" y="535" font-size="12" font-weight="800" fill="#34D399" letter-spacing="2">DATA FOUNDATION LAYER</text>

  <!-- LLM -->
  <g transform="translate(40, 550)" filter="url(#shadow)">
    <rect width="320" height="110" rx="20" fill="url(#cardGrad)" stroke="#F59E0B" stroke-width="2"/>
    <text x="160" y="36" text-anchor="middle" font-size="18" font-weight="900" fill="#FBBF24">🔮 Cognitive Engine (LLM)</text>
    <text x="160" y="64" text-anchor="middle" font-size="12" fill="#94A3B8">Claude • GPT-4 • Gemini • Llama</text>
    <text x="160" y="86" text-anchor="middle" font-size="12" fill="#cbd5e1" font-weight="700">Enterprise: Bedrock • Azure • Vertex</text>
  </g>

  <!-- Database -->
  <g transform="translate(390, 550)" filter="url(#shadow)">
    <rect width="320" height="110" rx="20" fill="url(#cardGrad)" stroke="#3B82F6" stroke-width="2"/>
    <text x="160" y="36" text-anchor="middle" font-size="18" font-weight="900" fill="#60A5FA">🗄️ Ground Truth (DB)</text>
    <text x="160" y="64" text-anchor="middle" font-size="12" fill="#94A3B8">Snowflake • BigQuery • Postgres</text>
    <text x="160" y="86" text-anchor="middle" font-size="12" fill="#cbd5e1" font-weight="700">🔄 Drift Sync Service Included</text>
  </g>

  <!-- Catalog / Vectors -->
  <g transform="translate(740, 550)" filter="url(#shadow)">
    <rect width="320" height="110" rx="20" fill="url(#cardGrad)" stroke="#818CF8" stroke-width="2"/>
    <text x="160" y="36" text-anchor="middle" font-size="18" font-weight="900" fill="#A5B4FC">📘 Metadata &amp; Memory</text>
    <text x="160" y="64" text-anchor="middle" font-size="12" fill="#94A3B8">HNSW • Qdrant • Pinecone • SQLite</text>
    <text x="160" y="86" text-anchor="middle" font-size="12" fill="#cbd5e1" font-weight="700">Semantic Ontology • Knowledge Packs</text>
  </g>

  <!-- ===== FOOTER: OUTPUT CONTRACT ===== -->
  <g transform="translate(40, 700)" filter="url(#shadow)">
    <rect width="1020" height="100" rx="20" fill="url(#cardGrad)" stroke="#64748B" stroke-width="2" stroke-dasharray="10,5"/>
    <text x="510" y="38" text-anchor="middle" font-size="18" font-weight="900" fill="#f8fafc">📤 Unified v3 Event Stream Agreement</text>
    <text x="510" y="70" text-anchor="middle" font-size="14" fill="#34D399" font-family="'SFMono-Regular', Consolas, monospace" font-weight="700">
      Status → Reasoning → Tool Dispatch → Result Data → ChartSpec → Confidence
    </text>
  </g>

  <!-- Connecting arrows (vertical) -->
  <line x1="820" y1="210" x2="820" y2="260" stroke="#60A5FA" stroke-width="3" opacity="0.6" marker-end="url(#arrowBlue)"/>
  <line x1="550" y1="500" x2="550" y2="550" stroke="#34D399" stroke-width="3" opacity="0.6" marker-end="url(#arrowGreen)"/>
  
  <!-- Bidirectional feedback flow -->
  <path d="M 100 260 Q 50 230 100 210" fill="none" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowAmber)" opacity="0.5"/>

</svg>
