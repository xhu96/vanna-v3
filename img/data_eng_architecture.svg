<svg width="1000" height="750" viewBox="0 0 1000 750" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Sophisticated Shadows & Glows -->
        <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
            <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="12" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        
        <!-- Markers -->
        <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <path d="M0,0 L10,3.5 L0,7 Z" fill="#6B7280"/>
        </marker>
        <marker id="arrowHeadAccent" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <path d="M0,0 L10,3.5 L0,7 Z" fill="#818CF8"/>
        </marker>
        <marker id="arrowHeadSuccess" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <path d="M0,0 L10,3.5 L0,7 Z" fill="#10B981"/>
        </marker>

        <!-- Gradients -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0B0F19" />
            <stop offset="100%" stop-color="#111827" />
        </linearGradient>
        <linearGradient id="coreBg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1E293B" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#0F172A" stop-opacity="0.95" />
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366F1" />
            <stop offset="100%" stop-color="#4F46E5" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1000" height="750" fill="url(#bgGrad)"/>
    
    <!-- Grid Pattern overlay -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
        <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <rect width="1000" height="750" fill="url(#grid)"/>

    <!-- Title -->
    <text x="500" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="950" fill="#F9FAFB" text-anchor="middle" letter-spacing="-0.5" filter="url(#glow)">Vanna 3.2: The Data Engineering OS</text>
    <text x="500" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#94A3B8" text-anchor="middle">Secure, Governed, and Scalable Knowledge-as-Code Architecture</text>

    <!-- ==== LEFT COLUMN: CONSUMPTION ==== -->
    <text x="130" y="220" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#64748B" text-anchor="middle" letter-spacing="2">CONSUMPTION</text>
    
    <rect x="50" y="240" width="160" height="90" rx="16" fill="#1F2937" stroke="#818CF8" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="285" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#F9FAFB" text-anchor="middle">&lt;vanna-chat&gt;</text>
    <text x="130" y="305" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94A3B8" text-anchor="middle">Modern Web UI</text>

    <!-- Flow Arrow from UI to Agent -->
    <path d="M 210 285 L 260 285" stroke="#818CF8" stroke-width="2.5" marker-end="url(#arrowHeadAccent)"/>
    <text x="235" y="275" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#818CF8" text-anchor="middle">Events</text>

    <!-- Return flow stream -->
    <path d="M 310 630 C 240 630 240 340 210 310" fill="none" stroke="#10B981" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowHeadSuccess)"/>
    <text x="235" y="470" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#10B981" text-anchor="middle" transform="rotate(-90 235 470)">Evidence Stream (v3 Contract)</text>

    <!-- ==== CENTER COLUMN: THE ORCHESTRATOR ==== -->
    <rect x="270" y="160" width="460" height="520" rx="24" fill="url(#coreBg)" stroke="#374151" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="500" y="200" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#F9FAFB" text-anchor="middle" letter-spacing="1.5">AGENT COGNITIVE PIPELINE</text>
    <line x1="290" y1="215" x2="710" y2="215" stroke="#374151" stroke-width="1.5"/>

    <!-- Step 1: Context Enhancers -->
    <rect x="300" y="240" width="400" height="65" rx="12" fill="#1E293B" stroke="#4B5563" stroke-width="1.5"/>
    <circle cx="335" cy="272.5" r="16" fill="url(#accentGrad)"/>
    <text x="335" y="278.5" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="365" y="265" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#F3F4F6">Personalization &amp; RAG</text>
    <text x="365" y="285" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#94A3B8">Injected Taxonomy • Glossary • User Context</text>

    <!-- Step 2: Semantic Router -->
    <rect x="300" y="325" width="400" height="65" rx="12" fill="#1E293B" stroke="#4B5563" stroke-width="1.5"/>
    <circle cx="335" cy="357.5" r="16" fill="url(#accentGrad)"/>
    <text x="335" y="363.5" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="365" y="350" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#F3F4F6">Semantic Routing Service</text>
    <text x="365" y="370" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#94A3B8">Metrics First • Skill Specs • LLM Synthesis</text>

    <!-- Step 3: Lifecycle Hooks / Quality Gate -->
    <rect x="300" y="410" width="400" height="65" rx="12" fill="#1E293B" stroke="#4B5563" stroke-width="1.5"/>
    <circle cx="335" cy="442.5" r="16" fill="url(#accentGrad)"/>
    <text x="335" y="448.5" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="365" y="435" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#F3F4F6">Policy &amp; Governance Gate</text>
    <text x="365" y="455" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#94A3B8">DataHubSync • Quality Checks • Rate Limits</text>

    <!-- Step 4: SQL Runners -->
    <rect x="300" y="495" width="400" height="65" rx="12" fill="#1E293B" stroke="#4B5563" stroke-width="1.5"/>
    <circle cx="335" cy="527.5" r="16" fill="url(#accentGrad)"/>
    <text x="335" y="533.5" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="365" y="520" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#F3F4F6">Secure Execution Layer</text>
    <text x="365" y="540" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#94A3B8">Read-Only SQL • Snowflake/PG/BQ Runners</text>

    <!-- Step 5: Evidence & Redaction -->
    <rect x="300" y="580" width="400" height="65" rx="12" fill="#1E293B" stroke="#4B5563" stroke-width="1.5"/>
    <circle cx="335" cy="612.5" r="16" fill="url(#accentGrad)"/>
    <text x="335" y="618.5" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle">5</text>
    <text x="365" y="605" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#F3F4F6">Lineage &amp; Safety Masking</text>
    <text x="365" y="625" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#94A3B8">PII Redaction • Provenance Collection</text>

    <!-- Internal Flow Arrows -->
    <path d="M 500 305 L 500 320" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowHead)"/>
    <path d="M 500 390 L 500 405" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowHead)"/>
    <path d="M 500 475 L 500 490" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowHead)"/>
    <path d="M 500 560 L 500 575" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowHead)"/>

    <!-- ==== RIGHT COLUMN: GOVERNANCE ECOSYSTEM ==== -->
    <text x="850" y="220" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#64748B" text-anchor="middle" letter-spacing="2">GOVERNANCE</text>
    
    <!-- DataHub -->
    <rect x="760" y="240" width="180" height="75" rx="12" fill="#1E293B" stroke="#F59E0B" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="850" y="275" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#F59E0B" text-anchor="middle">DataHub Sync</text>
    <text x="850" y="295" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">Metadata Governance</text>
    <path d="M 760 277 L 705 277" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowHead)"/>

    <!-- Cube/dbt -->
    <rect x="760" y="335" width="180" height="75" rx="12" fill="#1E293B" stroke="#EC4899" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="850" y="370" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#EC4899" text-anchor="middle">Cube / dbt</text>
    <text x="850" y="390" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">Semantic Layer Source</text>
    <path d="M 705 357 L 755 357" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowHead)"/>

    <!-- Great Expectations -->
    <rect x="760" y="430" width="180" height="75" rx="12" fill="#1E293B" stroke="#06B6D4" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="850" y="465" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#06B6D4" text-anchor="middle">Great Expectations</text>
    <text x="850" y="485" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">Data Health Validation</text>
    <path d="M 760 467 L 705 467" stroke="#06B6D4" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowHead)"/>

    <!-- Snowflake / Flink -->
    <rect x="760" y="525" width="180" height="75" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="850" y="560" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#3B82F6" text-anchor="middle">Snowflake / Flink</text>
    <text x="850" y="580" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">Cloud Warehouse / Stream</text>
    <path d="M 705 562 L 755 562" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowHead)"/>

</svg>
