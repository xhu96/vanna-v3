name: Provider Integration Tests

on:
  workflow_dispatch:
  schedule:
    # Weekly (Mondays at 03:00 UTC)
    - cron: "0 3 * * 1"

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  check:
    name: Check secrets
    runs-on: ubuntu-latest
    outputs:
      has_openai: ${{ steps.check.outputs.has_openai }}
      has_openrouter: ${{ steps.check.outputs.has_openrouter }}
      has_anthropic: ${{ steps.check.outputs.has_anthropic }}
      has_gemini: ${{ steps.check.outputs.has_gemini }}
      has_azure: ${{ steps.check.outputs.has_azure }}
    steps:
      - id: check
        run: |
          echo "has_openai=${{ secrets.OPENAI_API_KEY != '' }}" >> "$GITHUB_OUTPUT"
          echo "has_openrouter=${{ secrets.OPENROUTER_API_KEY != '' }}" >> "$GITHUB_OUTPUT"
          echo "has_anthropic=${{ secrets.ANTHROPIC_API_KEY != '' }}" >> "$GITHUB_OUTPUT"
          echo "has_gemini=${{ secrets.GEMINI_API_KEY != '' || secrets.GOOGLE_API_KEY != '' }}" >> "$GITHUB_OUTPUT"
          echo "has_azure=${{ secrets.AZURE_OPENAI_API_KEY != '' && secrets.AZURE_OPENAI_ENDPOINT != '' && secrets.AZURE_OPENAI_MODEL != '' }}" >> "$GITHUB_OUTPUT"

  openai:
    name: OpenAI
    needs: check
    if: needs.check.outputs.has_openai == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox
      - name: Run OpenAI tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: tox -e py311-openai

  openrouter:
    name: OpenRouter
    needs: check
    if: needs.check.outputs.has_openrouter == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox
      - name: Run OpenRouter tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Recommended: set a model explicitly; falls back to openai/gpt-4o-mini
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_HTTP_REFERER: ${{ secrets.OPENROUTER_HTTP_REFERER }}
          OPENROUTER_APP_TITLE: ${{ secrets.OPENROUTER_APP_TITLE }}
        run: tox -e py311-openrouter

  anthropic:
    name: Anthropic
    needs: check
    if: needs.check.outputs.has_anthropic == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox
      - name: Run Anthropic tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: tox -e py311-anthropic

  gemini:
    name: Gemini
    needs: check
    if: needs.check.outputs.has_gemini == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox
      - name: Run Gemini tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: tox -e py311-gemini

  azureopenai:
    name: Azure OpenAI
    needs: check
    if: needs.check.outputs.has_azure == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox
      - name: Run Azure OpenAI tests
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
        run: tox -e py311-azureopenai
