<svg width="1000" height="700" viewBox="0 0 1000 700" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Definitions for drop shadows, gradients, and arrows -->
    <defs>
        <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
        </filter>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <marker id="arrowHead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 Z" fill="#6B7280"/>
        </marker>
        <marker id="arrowHeadAccent" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 Z" fill="#7F5AF0"/>
        </marker>
        <marker id="arrowHeadSuccess" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 Z" fill="#10B981"/>
        </marker>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0B0F19" />
            <stop offset="100%" stop-color="#111827" />
        </linearGradient>
        <linearGradient id="coreBg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1F2937" />
            <stop offset="100%" stop-color="#111827" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1000" height="700" fill="url(#bgGrad)"/>
    
    <!-- Grid Pattern overlay -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <rect width="1000" height="700" fill="url(#grid)"/>

    <!-- Title -->
    <text x="500" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#F9FAFB" text-anchor="middle" filter="url(#glow)">Vanna 3.2: Data Engineering OS</text>
    <text x="500" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#9CA3AF" text-anchor="middle">Secure, Governed, and Scalable NL2SQL Architecture</text>

    <!-- ==== LEFT COLUMN: Frontend ==== -->
    <rect x="50" y="300" width="160" height="80" rx="12" fill="#1F2937" stroke="#7F5AF0" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="340" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#F9FAFB" text-anchor="middle">Vanna Chat UI</text>
    <text x="130" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF" text-anchor="middle">Web Component</text>

    <!-- Flow Arrow from UI to Agent -->
    <path d="M 210 330 L 260 330" stroke="#7F5AF0" stroke-width="2" marker-end="url(#arrowHeadAccent)"/>
    <text x="235" y="320" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#7F5AF0" text-anchor="middle">Events</text>

    <!-- Return flow string -->
    <path d="M 310 580 C 250 580 250 350 210 350" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowHeadSuccess)"/>
    <text x="260" y="470" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#10B981" text-anchor="middle" transform="rotate(-90 260 470)">Secure Results Stream</text>

    <!-- ==== CENTER COLUMN: Vanna Agent Core ==== -->
    <rect x="270" y="150" width="420" height="480" rx="16" fill="url(#coreBg)" stroke="#374151" stroke-width="2" filter="url(#shadow)"/>
    <text x="480" y="185" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#F9FAFB" text-anchor="middle" letter-spacing="1">AGENT EXECUTION PIPELINE</text>
    <line x1="290" y1="200" x2="670" y2="200" stroke="#374151" stroke-width="1"/>

    <!-- Step 1: Context Enhancers -->
    <rect x="310" y="230" width="340" height="60" rx="8" fill="#374151" stroke="#4B5563" stroke-width="1"/>
    <circle cx="340" cy="260" r="14" fill="#6B7280"/>
    <text x="340" y="265" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="middle">1</text>
    <text x="370" y="255" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F3F4F6">Context Enhancers</text>
    <text x="370" y="275" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF">Inject Taxonomy (DataHubSync)</text>

    <!-- Step 2: Semantic Router -->
    <rect x="310" y="310" width="340" height="60" rx="8" fill="#374151" stroke="#4B5563" stroke-width="1"/>
    <circle cx="340" cy="340" r="14" fill="#6B7280"/>
    <text x="340" y="345" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="middle">2</text>
    <text x="370" y="335" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F3F4F6">Semantic Routing &amp; LLM</text>
    <text x="370" y="355" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF">Route to Cube, open dbt PR, or Raw SQL</text>

    <!-- Step 3: Lifecycle Hooks / Quality Gate -->
    <rect x="310" y="390" width="340" height="60" rx="8" fill="#374151" stroke="#4B5563" stroke-width="1"/>
    <circle cx="340" cy="420" r="14" fill="#6B7280"/>
    <text x="340" y="425" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="middle">3</text>
    <text x="370" y="415" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F3F4F6">Data Quality Gate (Lifecycle Hook)</text>
    <text x="370" y="435" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF">Block query if GX table health fails</text>

    <!-- Step 4: SQL Runners -->
    <rect x="310" y="470" width="340" height="60" rx="8" fill="#374151" stroke="#4B5563" stroke-width="1"/>
    <circle cx="340" cy="500" r="14" fill="#6B7280"/>
    <text x="340" y="505" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="middle">4</text>
    <text x="370" y="495" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F3F4F6">Execution Layer</text>
    <text x="370" y="515" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF">Runners for Flink (Stream), PG, BQ, etc.</text>

    <!-- Step 5: Redaction -->
    <rect x="310" y="550" width="340" height="60" rx="8" fill="#374151" stroke="#4B5563" stroke-width="1"/>
    <circle cx="340" cy="580" r="14" fill="#6B7280"/>
    <text x="340" y="585" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="middle">5</text>
    <text x="370" y="575" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F3F4F6">Dynamic Redaction</text>
    <text x="370" y="595" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF">Mask PII natively using Microsoft Presidio</text>

    <!-- Internal Flow Arrows -->
    <path d="M 480 290 L 480 305" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowHead)"/>
    <path d="M 480 370 L 480 385" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowHead)"/>
    <path d="M 480 450 L 480 465" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowHead)"/>
    <path d="M 480 530 L 480 545" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowHead)"/>

    <!-- ==== RIGHT COLUMN: Enterprise Data Ecosystem ==== -->
    <text x="820" y="160" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F9FAFB" text-anchor="middle" letter-spacing="1">ENTERPRISE ECOSYSTEM</text>
    <line x1="720" y1="175" x2="920" y2="175" stroke="#374151" stroke-width="1"/>

    <!-- DataHub -->
    <rect x="740" y="210" width="160" height="60" rx="6" fill="#1F2937" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
    <text x="820" y="240" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F59E0B" text-anchor="middle">DataHub</text>
    <text x="820" y="255" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#9CA3AF" text-anchor="middle">Metadata &amp; Glossary</text>
    <path d="M 740 240 L 660 250" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowHead)"/>

    <!-- Cube/dbt -->
    <rect x="740" y="290" width="160" height="60" rx="6" fill="#1F2937" stroke="#EC4899" stroke-width="2" filter="url(#shadow)"/>
    <text x="820" y="320" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#EC4899" text-anchor="middle">Cube / dbt</text>
    <text x="820" y="335" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#9CA3AF" text-anchor="middle">Semantic Layer</text>
    <path d="M 650 340 L 730 320" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowHead)"/>

    <!-- Great Expectations -->
    <rect x="740" y="370" width="160" height="60" rx="6" fill="#1F2937" stroke="#06B6D4" stroke-width="2" filter="url(#shadow)"/>
    <text x="820" y="400" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#06B6D4" text-anchor="middle">Great Expectations</text>
    <text x="820" y="415" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#9CA3AF" text-anchor="middle">Quality Validation Gate</text>
    <path d="M 650 420 L 730 400" stroke="#06B6D4" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowHead)"/>

    <!-- Flink / DWH -->
    <rect x="740" y="450" width="160" height="60" rx="6" fill="#1F2937" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="820" y="480" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3B82F6" text-anchor="middle">Flink / Snowflake</text>
    <text x="820" y="495" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#9CA3AF" text-anchor="middle">Compute Engine</text>
    <path d="M 650 500 L 730 480" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowHead)"/>

</svg>
