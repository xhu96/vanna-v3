<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%" style="background-color: #0b0f19; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Patterns -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
    <pattern id="dotPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" fill-opacity="0.08" />
    </pattern>

    <!-- Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#DB2777" />
    </linearGradient>

    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.95" />
    </linearGradient>

    <!-- Filters -->
    <filter id="glowPrimary" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b0f19" />
  <rect width="100%" height="100%" fill="url(#gridPattern)" />
  <rect width="100%" height="100%" fill="url(#dotPattern)" />

  <!-- Header -->
  <g transform="translate(60, 40)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#primaryGrad)" filter="url(#glowPrimary)" opacity="0.2" />
    <path d="M 14 14 L 42 42 L 56 14 L 46 14 L 35 28 L 24 14 Z" fill="#6366F1" />
    <text x="80" y="42" fill="#ffffff" font-size="42" font-weight="950" letter-spacing="-1">Vanna 3.2 <tspan fill="#94A3B8" font-size="32" font-weight="600" letter-spacing="0">Unified Architecture</tspan></text>
  </g>
  
  <rect x="1300" y="45" width="240" height="48" rx="24" fill="#1e293b" stroke="#334155" stroke-width="2" />
  <text x="1420" y="76" fill="#38ef7d" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="700" text-anchor="middle">v3.2.0 Stable Release</text>

  <!-- ======================== -->
  <!-- LEFT COLUMN (Consumption) -->
  <!-- ======================== -->
  <g transform="translate(60, 140)" filter="url(#dropShadow)">
    <rect width="440" height="340" rx="28" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="2.5" />
    <g transform="translate(35, 40)">
      <rect x="0" y="0" width="44" height="44" rx="12" fill="url(#accentGrad)" opacity="0.2" />
      <text x="60" y="32" fill="#ffffff" font-size="26" font-weight="800">Consumption Layer</text>
    </g>

    <rect x="35" y="105" width="370" height="100" rx="18" fill="#111827" stroke="#334155" stroke-width="1.5" />
    <rect x="35" y="105" width="8" height="100" rx="4" fill="url(#accentGrad)" />
    <text x="65" y="145" fill="#f8fafc" font-size="22" font-weight="900">&lt;vanna-chat&gt;</text>
    <text x="65" y="175" fill="#94a3b8" font-size="14" font-weight="500">Universal Web Component (React/Vue/HTML)</text>

    <rect x="35" y="220" width="370" height="85" rx="18" fill="#111827" stroke="#334155" stroke-width="1.5" />
    <text x="65" y="255" fill="#cbd5e1" font-size="18" font-weight="700">Enterprise Ready</text>
    <circle cx="70" cy="280" r="4" fill="#EC4899" />
    <text x="85" y="285" fill="#94a3b8" font-size="14">Secure JWT/OAuth Identity Passthrough</text>
  </g>

  <!-- ======================== -->
  <!-- CENTER COLUMN (Agent)    -->
  <!-- ======================== -->
  <g transform="translate(540, 140)" filter="url(#dropShadow)">
    <rect width="1000" height="680" rx="32" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="2.5" />
    <rect x="0" y="0" width="1000" height="80" rx="32" fill="#1e293b" opacity="0.3" />
    
    <g transform="translate(40, 25)">
      <rect x="0" y="0" width="44" height="44" rx="12" fill="url(#purpleGrad)" opacity="0.2" />
      <text x="60" y="32" fill="#ffffff" font-size="28" font-weight="900">The Orchestration Engine</text>
    </g>

    <!-- Grid Layout in Agent -->
    <g transform="translate(40, 110)">
      <!-- Row 1 -->
      <rect width="450" height="240" rx="22" fill="#111827" stroke="#334155" stroke-width="2" />
      <text x="30" y="45" fill="#f8fafc" font-size="22" font-weight="800">Knowledge Strategy</text>
      
      <rect x="30" y="75" width="190" height="80" rx="14" fill="#0f172a" stroke="#475569" stroke-width="1" />
      <text x="50" y="105" fill="#ffffff" font-size="17" font-weight="700">Semantic Tools</text>
      <text x="50" y="130" fill="#94a3b8" font-size="13">Metrics &amp; Dimensions</text>

      <rect x="235" y="75" width="185" height="80" rx="14" fill="#0f172a" stroke="#475569" stroke-width="1" />
      <text x="255" y="105" fill="#ffffff" font-size="17" font-weight="700">Skill Fabric</text>
      <text x="255" y="130" fill="#94a3b8" font-size="13">Declarative Logic Ops</text>

      <rect x="30" y="170" width="390" height="50" rx="14" fill="#8B5CF6" opacity="0.15" />
      <text x="110" y="202" fill="#A78BFA" font-size="15" font-weight="800">USER RESOLVER: Identity Propagation</text>
    </g>

    <g transform="translate(510, 110)">
      <rect width="450" height="240" rx="22" fill="#111827" stroke="#334155" stroke-width="2" />
      <text x="30" y="45" fill="#f8fafc" font-size="22" font-weight="800">Execution &amp; Privacy</text>
      
      <rect x="30" y="75" width="190" height="80" rx="14" fill="#0f172a" stroke="#475569" stroke-width="1" />
      <text x="50" y="105" fill="#ffffff" font-size="17" font-weight="700">Run SQL</text>
      <text x="50" y="130" fill="#94a3b8" font-size="13">Pure Read-Only Engine</text>

      <rect x="235" y="75" width="185" height="80" rx="14" fill="#0f172a" stroke="#475569" stroke-width="1" />
      <text x="255" y="105" fill="#ffffff" font-size="17" font-weight="700">Redaction</text>
      <text x="255" y="130" fill="#94a3b8" font-size="13">PII Guard &amp; Masking</text>

      <rect x="30" y="170" width="390" height="50" rx="14" fill="#10B981" opacity="0.15" />
      <text x="120" y="202" fill="#34D399" font-size="15" font-weight="800">EVIDENCE LAYER: Full Lineage Trail</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(40, 375)">
      <rect width="920" height="260" rx="22" fill="#111827" stroke="#334155" stroke-width="2" />
      <text x="30" y="45" fill="#f8fafc" font-size="22" font-weight="800">Enterprise Data Connectors</text>
      
      <g transform="translate(30, 75)">
        <rect width="160" height="70" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1" />
        <text x="80" y="42" fill="#cbd5e1" font-size="16" font-weight="700" text-anchor="middle">Snowflake</text>
        
        <rect x="180" y="0" width="160" height="70" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1" />
        <text x="260" y="42" fill="#cbd5e1" font-size="16" font-weight="700" text-anchor="middle">BigQuery</text>
        
        <rect x="360" y="0" width="160" height="70" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1" />
        <text x="440" y="42" fill="#cbd5e1" font-size="16" font-weight="700" text-anchor="middle">PostgreSQL</text>
        
        <rect x="540" y="0" width="160" height="70" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1" />
        <text x="620" y="42" fill="#cbd5e1" font-size="16" font-weight="700" text-anchor="middle">Databricks</text>
        
        <rect x="720" y="0" width="160" height="70" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1" />
        <text x="800" y="42" fill="#cbd5e1" font-size="16" font-weight="700" text-anchor="middle">Redshift</text>
      </g>
      
      <rect x="30" y="165" width="860" height="70" rx="14" fill="url(#primaryGrad)" opacity="0.1" />
      <text x="460" y="205" fill="#6366F1" font-size="18" font-weight="900" text-anchor="middle">SCHEMA DRIFT SYNC: Automated Snapshot &amp; Memory Repair</text>
    </g>
  </g>

  <!-- ======================== -->
  <!-- FOUNDATION (Bottom Left) -->
  <!-- ======================== -->
  <g transform="translate(60, 500)" filter="url(#dropShadow)">
    <rect width="440" height="320" rx="28" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="2.5" />
    <g transform="translate(35, 40)">
      <rect x="0" y="0" width="44" height="44" rx="12" fill="url(#greenGrad)" opacity="0.2" />
      <text x="60" y="32" fill="#ffffff" font-size="26" font-weight="800">Intelligence Layer</text>
    </g>

    <rect x="35" y="105" width="370" height="170" rx="18" fill="#111827" stroke="#334155" stroke-width="1.5" />
    <text x="65" y="145" fill="#f8fafc" font-size="20" font-weight="800">Cognitive Providers</text>
    <text x="65" y="180" fill="#94a3b8" font-size="15">• Anthropic / OpenAI / Google</text>
    <text x="65" y="210" fill="#94a3b8" font-size="15">• Azure / Vertex AI / Bedrock</text>
    <text x="65" y="240" fill="#94a3b8" font-size="15">• Local Ollama / vLLM</text>
  </g>

</svg>